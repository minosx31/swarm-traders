name: Keep Alive

# Render's free web services spin down after ~15 min idle (a ~30-60s cold start
# on the next request). This pings /health periodically to keep it warm.
# If the service URL changes, edit BACKEND_URL below.
on:
  schedule:
    - cron: '*/10 * * * *' # every 10 min (GitHub best-effort; may be delayed under load)
  workflow_dispatch: {} # allow manual runs to test it

env:
  BACKEND_URL: https://swarm-traders.onrender.com

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          # retries + generous timeout so a cold start (or transient 502 during
          # spin-up) doesn't fail the job
          curl -fsS --retry 5 --retry-delay 10 --retry-all-errors --max-time 90 \
            "${BACKEND_URL%/}/health"
